<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Switcher</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styel.css" />
  </head>
  <body>
    <!-- Main Full-Screen Area -->
    <div id="mainContainer" class="vh-100 d-flex flex-column justify-content-center align-items-center transition-bg">
      
      <!-- Card Container for Content -->
      <div class="card shadow-lg p-4 p-md-5 rounded-4 text-center border-0 bg-white" style="max-width: 500px; width: 90%;">
        <h1 class="mb-4 fw-bold text-dark tracking-tight">Color Changer</h1>

        <div class="d-flex flex-column gap-3">
          <button class="btn btn-warning btn-lg randombtn shadow-sm rounded-pill fw-bold border-0">
            ✨ Random Color
          </button>

          <div class="input-group input-group-lg shadow-sm rounded-pill border">
            <input
              type="text"
              id="colorInput"
              class="form-control border-0 rounded-start-pill px-4"
              placeholder="e.g. red or #ff0000"
            />
            <button class="btn btn-dark applyBtn fw-bold px-4 rounded-end-pill" id="applyBtn">Apply</button>
          </div>
        </div>

        <p class="mt-4 mb-0 fs-5 fw-medium text-secondary">
          Current Color:
          <span class="currentColorValue badge bg-secondary ms-1 fs-6">#ffffff</span>
        </p>
      </div>

    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
