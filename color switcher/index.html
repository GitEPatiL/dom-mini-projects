<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Switcher</title>
    <link rel="stylesheet" href="styel.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="heading">Color Changer</h1>

      <div class="inputBtnContainer">
        <button class="randombtn">Random Color</button>

        <input
          type="text"
          id="colorInput"
          placeholder="Enter a color or hex (e.g. red or #0)"
        />

        <button class="applyBtn" id="applyBtn">Apply Color</button>
      </div>

      <p class="currentColor">
        Current Color :
        <span class="currentColorValue">green</span>
      </p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
