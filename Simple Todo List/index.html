<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Todo List</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Bootstrap Icons CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="d-flex align-items-center justify-content-center vh-100">
    <div class="container" style="max-width: 500px">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4 p-md-5">
          <h1
            class="card-title text-center mb-4 fw-bold text-primary"
            style="font-family: &quot;Outfit&quot;, sans-serif"
          >
            <i
              class="bi bi-check2-square border border-primary rounded px-2"
            ></i>
            To-Do List
          </h1>

          <div class="input-group mb-4 shadow-sm rounded-3">
            <input
              type="text"
              id="input"
              class="form-control form-control-lg border-primary"
              placeholder="What needs to be done?"
            />
            <button
              class="btn btn-lg addBtn px-4 fw-semibold shadow-none"
            >
              Add
            </button>
          </div>

          <div
            class="userTasks-wrapper"
            style="max-height: 50vh; overflow-y: auto; overflow-x: hidden"
          >
            <div class="userTasks d-flex flex-column gap-2">
              <!-- Tasks will be dynamically injected here -->
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS (Optional but standard to include) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
